<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1f4d6b" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Walk With Me" />
    <meta name="description" content="OKC Girls Camp 2026 faith walk audio experience" />
    <title>Walk With Me</title>
    <link rel="manifest" href="./manifest.json" />
    <link rel="stylesheet" href="./css/styles.css" />
    <link rel="icon" href="./icons/favicon.png" type="image/png" />
    <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />
  </head>
  <body>
    <main class="app-shell">
      <section id="homeSection" class="hero card" aria-labelledby="home-title">
        <div class="logo-wrap" aria-hidden="true">
          <img src="./assets/images/logo.png" alt="" class="logo" />
        </div>
        <p class="eyebrow">OKC Girls Camp 2026</p>
        <h1 id="home-title">Walk With Me</h1>
        <p class="scripture">Moses 6:34</p>

        <div class="button-row">
          <button id="downloadButton" class="button primary" type="button">Download for Camp</button>
          <button id="beginJourneyButton" class="button secondary" type="button" disabled>Begin Journey</button>
        </div>
        <a href="./offline.html" class="button secondary wide">Offline Test</a>

        <div class="progress-shell" aria-live="polite">
          <div class="progress-meta">
            <span id="progressLabel">Download status</span>
            <span id="progressValue">0%</span>
          </div>
          <progress id="downloadProgress" max="100" value="0"></progress>
        </div>

        <div id="downloadStatus" class="status-card" role="status" aria-live="polite">
          Tap download to cache all camp content for offline use.
        </div>
        <div id="readyBadge" class="ready-badge" hidden>✅ Ready for Camp</div>
      </section>

      <section id="walkSection" class="card walk-card" hidden>
        <button id="homeButton" class="button secondary home-button" type="button">Home</button>
        <div class="walk-header">
          <p class="eyebrow">Station</p>
          <h2 id="stationTitle">Station 1</h2>
        </div>

        <audio id="stationAudio" preload="auto" playsinline></audio>

        <div class="button-stack">
          <button id="playButton" class="button primary large" type="button">Play</button>
          <button id="previousButton" class="button secondary large" type="button" hidden>Previous Station</button>
          <button id="nextButton" class="button secondary large" type="button">Next Station</button>
        </div>
      </section>
    </main>

    <script src="./js/app.js"></script>
  </body>
</html>
